name: release

# A canonical sync that lands a new package version on public main is the
# release trigger. Already-published versions are a no-op. New versions run CI,
# pause at the protected `npm` environment, publish through trusted publishing,
# then receive their matching tag and GitHub Release.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-24.04
    outputs:
      publish: ${{ steps.version.outputs.publish }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - id: version
        name: Detect an unpublished package version
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          node -e "const v=process.argv[1]; if (!/^\\d+\\.\\d+\\.\\d+([+-][0-9A-Za-z.-]+)?$/.test(v)) process.exit(1)" "$version" \
            || { echo "::error::invalid package version: $version"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          if npm view "@littlebigbrain/client@${version}" version >/dev/null 2>&1; then
            echo "@littlebigbrain/client@${version} is already published; release is a no-op"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "@littlebigbrain/client@${version} is not on npm; release is required"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

  ci:
    needs: [preflight]
    if: ${{ needs.preflight.outputs.publish == 'true' }}
    uses: ./.github/workflows/ci.yml

  publish-npm:
    needs: [preflight, ci]
    if: ${{ needs.preflight.outputs.publish == 'true' }}
    runs-on: ubuntu-24.04
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Update npm for trusted publishing
        run: npm install -g npm@^11.5.1
      - run: npm ci
      - run: npm run build
      - name: Verify package version
        env:
          EXPECTED_VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          actual=$(node -p "require('./package.json').version")
          [ "$actual" = "$EXPECTED_VERSION" ] \
            || { echo "::error::package version $actual != expected $EXPECTED_VERSION"; exit 1; }
      - name: Publish @littlebigbrain/client
        run: npm publish

  github-release:
    needs: [preflight, publish-npm]
    if: ${{ needs.preflight.outputs.publish == 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Create the version tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "release $RELEASE_TAG already exists; nothing to do"
          else
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
