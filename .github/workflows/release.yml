name: release

# Publishes @littlebigbrain/client to npm from a signed vX.Y.Z tag via npm
# trusted publishing (OIDC) — no long-lived registry tokens. Publishing is
# immutable: a bad release is deprecated and fixed forward, never
# re-published.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  version-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Tag matches package version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          version=$(node -p "require('./package.json').version")
          [ "$tag" = "$version" ] || { echo "::error::tag v${tag} != package version ${version}"; exit 1; }

  publish-npm:
    needs: [ci, version-check]
    runs-on: ubuntu-24.04
    environment: npm
    permissions:
      contents: read
      id-token: write # npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v5
      # No registry-url here: setup-node's registry-url writes an .npmrc with
      # an _authToken=${NODE_AUTH_TOKEN} line, and npm treats that (even
      # unset) as configured auth and never attempts the OIDC exchange —
      # trusted publishing requires no auth config at all.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Update npm (trusted publishing needs >= 11.5.1; Node 24 images can bundle older)
        run: |
          npm install -g npm@^11.5.1
          npm --version
      - run: npm ci
      - run: npm run build
      - name: Publish @littlebigbrain/client (skip if version already published)
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          if npm view "@littlebigbrain/client@${version}" version >/dev/null 2>&1; then
            echo "@littlebigbrain/client@${version} already on npm; skipping"
            exit 0
          fi
          npm publish

  github-release:
    needs: [publish-npm]
    runs-on: ubuntu-24.04
    permissions:
      contents: write # create the GitHub Release object for the tag
    steps:
      - uses: actions/checkout@v5
      - name: Create the GitHub Release for the tag (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists; nothing to do"
          else
            gh release create "$tag" --verify-tag --title "$tag" --generate-notes
          fi
